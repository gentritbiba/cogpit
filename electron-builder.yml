appId: com.cogpit.app
productName: Cogpit
copyright: "Copyright © 2026 Gentrit Biba"

publish:
  provider: github
  owner: gentritbiba
  repo: cogpit

directories:
  output: release
  buildResources: build

asar: true
asarUnpack:
  # Native Claude CLI binary spawned by the agent SDK — must live outside asar
  - node_modules/@anthropic-ai/claude-agent-sdk-*/**
# "maximum" made the Linux packaging step take ~7 min per target in CI
# (compression-bound); "normal" is 2-4x faster for a few percent larger
# artifacts. Measured 2026-07-21 on the v1.1.3/v1.1.4 release runs.
compression: normal

files:
  - out/**/*
  - "!out/**/*.map"
  - "!node_modules/**/*.{md,map,ts,d.ts}"
  - "!node_modules/**/{CHANGELOG,README,LICENSE,LICENCE,readme,changelog}*"
  - "!node_modules/**/{test,tests,__tests__,spec,specs,example,examples,docs}/**"
  # Renderer-only packages (already bundled into out/renderer/) — exclude from asar
  - "!node_modules/shiki/**"
  - "!node_modules/@shikijs/**"
  - "!node_modules/lucide-react/**"
  - "!node_modules/@radix-ui/**"
  - "!node_modules/react-markdown/**"
  - "!node_modules/react-resizable-panels/**"
  - "!node_modules/@tanstack/**"
  - "!node_modules/class-variance-authority/**"
  - "!node_modules/tailwind-merge/**"
  - "!node_modules/remark-gfm/**"

extraMetadata:
  main: out/main/main.js

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: pacman
      arch:
        - x64
  category: Development

pacman:
  # fpm defaults to xz, which is the slowest part of the pacman CI job.
  # zstd is what Arch itself ships — ~5-10x faster to create, near-equal size.
  fpm:
    - "--pacman-compression"
    - "zstd"
  depends:
    - c-ares
    - gcc-libs
    - glibc
    - gtk3
    - libcups
    - libdrm
    - libnotify
    - libxcrypt-compat
    - libxss
    - mesa
    - nss
    - alsa-lib
