name: Quality

on:
  workflow_call:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install application dependencies
        run: bun install --frozen-lockfile

      - name: Install cogpit-memory dependencies
        working-directory: packages/cogpit-memory
        run: bun install --frozen-lockfile

      - name: Check dependency advisories
        run: bun run check:audit

      - name: Lint
        run: bun run lint

      - name: Check architecture boundaries
        run: bun run check:architecture

      - name: Check ungoverned duplication
        run: bun run check:duplicates

      - name: Check generated session core
        run: bun run check:cogpit-memory-sync

      - name: Type-check production code
        run: bun run typecheck

      - name: Type-check tests
        run: bun run typecheck:tests

      - name: Test application and server with coverage
        run: bun run test:coverage

      - name: Test cogpit-memory
        working-directory: packages/cogpit-memory
        run: bun run test

      - name: Build cogpit-memory standalone binary
        working-directory: packages/cogpit-memory
        run: bun run build

      - name: Build web application
        run: bun run build:web

      - name: Build Electron application
        run: bun run electron:build

      - name: Build cogpit-memory npm package
        working-directory: packages/cogpit-memory
        run: bun run build:npm

      - name: Verify cogpit-memory package and CLI contracts
        working-directory: packages/cogpit-memory
        run: node scripts/test-package-contract.mjs
