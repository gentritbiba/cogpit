name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  ARCHLINUX_IMAGE: archlinux:base@sha256:fe6972d4dc1f660c0c10f4c41b2de8986bab89e7e2955378f8beadb8ebcd7433 # base-20260712.0.555161

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    # Intentionally NOT gated on quality: builds and quality run in parallel
    # (saves the full quality duration off the release critical path).
    # `publish` requires BOTH, so no artifact ships without a green quality run.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmd: bun run electron:package -- --mac --arm64 --x64 --publish never
            pattern: "release/*.dmg"
          - os: ubuntu-latest
            name: Linux (AppImage)
            cmd: bun run electron:package -- --linux AppImage --x64 --publish never
            pattern: "release/*.AppImage"
          - os: ubuntu-latest
            name: Linux (pacman)
            cmd: bun run electron:package -- --linux pacman --x64 --publish never
            pattern: "release/*.pacman"

    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      # Electron + electron-builder binary downloads (~100MB per run otherwise)
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Build and package (${{ matrix.name }})
        run: ${{ matrix.cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.name }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  publish:
    needs: [quality, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Verify release artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          for extension in dmg AppImage pacman; do
            if ! find artifacts -maxdepth 1 -type f -name "*.${extension}" -print -quit | grep -q .; then
              echo "Missing required .${extension} release artifact" >&2
              exit 1
            fi
          done

          if find artifacts -maxdepth 1 -type f \
            ! -name "*.dmg" \
            ! -name "*.AppImage" \
            ! -name "*.pacman" \
            -print -quit | grep -q .; then
            echo "Release artifact manifest contains an unexpected file type" >&2
            find artifacts -maxdepth 1 -type f -print >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-aur:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download .pacman from release
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --pattern "cogpit-*.pacman" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksum
        id: checksum
        run: echo "sha256=$(sha256sum cogpit-*.pacman | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/cogpit.git aur-repo

      - name: Update PKGBUILD
        run: |
          sed -e 's/%%PKGVER%%/${{ steps.version.outputs.pkgver }}/' \
              -e 's/%%SHA256%%/${{ steps.checksum.outputs.sha256 }}/' \
              aur/PKGBUILD.template > aur-repo/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd aur-repo
          docker run --rm -v "$PWD:/pkg" "$ARCHLINUX_IMAGE" bash -c \
            "pacman -Syu --noconfirm pacman-contrib && useradd -m builder && chown -R builder:builder /pkg && su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"

      - name: Push to AUR
        run: |
          cd aur-repo
          sudo chown -R "$(id -u):$(id -g)" .
          git config user.name "Gentrit Biba"
          git config user.email "gentritbiba@gmail.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.pkgver }}"
          git push

  update-aur-server:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/cogpit-server.git aur-repo

      - name: Update PKGBUILD
        run: |
          sed -e 's/%%PKGVER%%/${{ steps.version.outputs.pkgver }}/' \
              aur/PKGBUILD-server.template > aur-repo/PKGBUILD
          cp aur/cogpit-server.service aur-repo/

      - name: Generate .SRCINFO
        run: |
          cd aur-repo
          docker run --rm -v "$PWD:/pkg" "$ARCHLINUX_IMAGE" bash -c \
            "pacman -Syu --noconfirm pacman-contrib && useradd -m builder && chown -R builder:builder /pkg && su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"

      - name: Push to AUR
        run: |
          cd aur-repo
          sudo chown -R "$(id -u):$(id -g)" .
          git config user.name "Gentrit Biba"
          git config user.email "gentritbiba@gmail.com"
          git add PKGBUILD .SRCINFO cogpit-server.service
          git commit -m "Update to ${{ steps.version.outputs.pkgver }}"
          git push
